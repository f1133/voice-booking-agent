<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI Receptionist — v0 voice demo</title>
<style>
  :root { --bg:#0f1115; --card:#191c22; --line:#2a2e37; --muted:#8b909b;
          --txt:#e7e9ee; --accent:#3ba776; --you:#243044; --agent:#1f2730;
          --red:#d8584f; --warn:#e0a23c; }
  * { box-sizing:border-box; }
  body { margin:0; font:15px/1.5 system-ui,Segoe UI,Roboto,sans-serif;
         background:var(--bg); color:var(--txt); }
  .wrap { max-width:880px; margin:0 auto; padding:20px; display:grid;
          grid-template-columns: 1fr 280px; gap:18px; }
  h1 { font-size:18px; font-weight:600; margin:0 0 2px; }
  .sub { color:var(--muted); font-size:13px; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:14px; }
  .phone { display:flex; flex-direction:column; height:74vh; min-height:480px; }
  .bar { padding:14px 16px; border-bottom:1px solid var(--line);
         display:flex; align-items:center; gap:10px; }
  .dot { width:9px; height:9px; border-radius:50%; background:#555; }
  .dot.live { background:var(--accent); box-shadow:0 0 0 3px rgba(59,167,118,.2); }
  .pill { font-size:12px; color:var(--muted); margin-left:auto; }
  .log { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:10px; }
  .msg { max-width:78%; padding:9px 13px; border-radius:14px; white-space:pre-wrap; }
  .msg.agent { background:var(--agent); align-self:flex-start; border-bottom-left-radius:4px; }
  .msg.you { background:var(--you); align-self:flex-end; border-bottom-right-radius:4px; }
  .msg.sys { align-self:center; background:transparent; color:var(--muted);
             font-size:13px; max-width:100%; text-align:center; }
  .msg.alert { background:rgba(216,88,79,.15); color:#f1b0ab; align-self:flex-start; }
  .ctrls { padding:14px 16px; border-top:1px solid var(--line); display:flex;
           gap:10px; align-items:center; flex-wrap:wrap; }
  button { font:inherit; border:0; border-radius:10px; padding:10px 16px; cursor:pointer;
           color:#fff; background:#2c313b; }
  button:disabled { opacity:.4; cursor:not-allowed; }
  .call { background:var(--accent); }
  .hangup { background:var(--red); }
  .mic { background:#2c313b; min-width:150px; }
  .mic.rec { background:var(--red); animation:pulse 1.1s infinite; }
  @keyframes pulse { 50% { opacity:.6; } }
  input[type=text] { flex:1; min-width:160px; background:#11141a; color:var(--txt);
        border:1px solid var(--line); border-radius:10px; padding:10px 12px; }
  .side h2 { font-size:14px; margin:0 0 4px; }
  .side .count { font-size:13px; color:var(--accent); margin-bottom:10px; }
  .slots { list-style:none; margin:0; padding:0; max-height:60vh; overflow-y:auto;
           font-size:12.5px; color:var(--muted); }
  .slots li { padding:6px 8px; border-bottom:1px solid var(--line); }
  .side .reset { margin-top:12px; width:100%; background:#2c313b; }
  a { color:var(--accent); }
</style>

<div class="wrap">
  <section class="card phone">
    <div class="bar">
      <span class="dot" id="dot"></span>
      <div>
        <h1>Bright Health Clinic</h1>
        <div class="sub" id="status">Not connected</div>
      </div>
      <span class="pill" id="pill"></span>
    </div>
    <div class="log" id="log">
      <div class="msg sys">Press <b>Call</b>, allow the microphone, then talk to book an appointment.</div>
    </div>
    <div class="ctrls">
      <button class="call" id="callBtn">Call</button>
      <button class="hangup" id="hangBtn" disabled>Hang up</button>
      <button class="mic" id="micBtn" disabled>Hold to talk</button>
      <input type="text" id="txt" placeholder="…or type here" disabled>
      <button id="sendBtn" disabled>Send</button>
    </div>
  </section>

  <aside class="card side" style="padding:14px 16px;">
    <h2>Live calendar</h2>
    <div class="count" id="count">—</div>
    <ul class="slots" id="slots"></ul>
    <button class="reset" id="resetBtn">Reset calendar</button>
  </aside>
</div>

<script>
const $ = id => document.getElementById(id);
let sid = null, rec = null, stream = null, chunks = [], recording = false;
let nlu = '', sttBackend = '', serverTTS = false, curAudio = null;
function setPill(){
  $('pill').textContent = [nlu && 'nlu: '+nlu, sttBackend && 'stt: '+sttBackend,
                           'tts: ' + (serverTTS ? 'kokoro' : 'browser')].filter(Boolean).join(' · ');
}

let voices = [];
function loadVoices(){ voices = speechSynthesis.getVoices() || []; }
loadVoices();
if (typeof speechSynthesis !== 'undefined') speechSynthesis.onvoiceschanged = loadVoices;
function pickVoice(){
  const good = /natural|neural|online|aria|jenny|guy|libby|sonia|emma|michelle|google us english/i;
  const en = voices.filter(v => /^en/i.test(v.lang));
  return en.find(v => good.test(v.name)) || en.find(v => !/david|zira|mark/i.test(v.name)) || en[0] || null;
}
function browserSpeak(text){
  try {
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    const v = pickVoice(); if (v) u.voice = v;
    u.rate = 1.0; u.pitch = 1.0;
    speechSynthesis.speak(u);
  } catch(e){}
}

function add(role, text){
  const d = document.createElement('div');
  d.className = 'msg ' + role;
  d.textContent = text;
  $('log').appendChild(d);
  $('log').scrollTop = $('log').scrollHeight;
}
function stopSpeaking(){
  try { if (curAudio){ curAudio.pause(); curAudio = null; } } catch(e){}
  try { speechSynthesis.cancel(); } catch(e){}
}
async function speak(text){
  if (!text) return;
  stopSpeaking();
  if (serverTTS){
    try {
      const resp = await fetch('/api/tts', {method:'POST',
        headers:{'Content-Type':'application/json'}, body:JSON.stringify({text})});
      if (resp.ok){
        const url = URL.createObjectURL(await resp.blob());
        if (curAudio){ curAudio.pause(); }
        curAudio = new Audio(url);
        curAudio.onended = () => URL.revokeObjectURL(url);
        await curAudio.play();
        return;
      }
    } catch(e){ /* fall through to browser voice */ }
  }
  browserSpeak(text);
}
function setLive(on){
  $('dot').classList.toggle('live', on);
  $('status').textContent = on ? 'Connected' : 'Call ended';
  $('hangBtn').disabled = !on; $('micBtn').disabled = !on;
  $('txt').disabled = !on; $('sendBtn').disabled = !on;
  $('callBtn').disabled = on;
}
async function refreshAvail(data){
  const a = data || await (await fetch('/api/availability')).json();
  $('count').textContent = a.open + ' open slots';
  $('slots').innerHTML = a.slots.map(s => `<li>#${s.id} · ${s.label}</li>`).join('');
}
function applyResult(r){
  if (r.transcript) add('you', r.transcript);
  if (r.reply) { add(r.escalated ? 'alert' : 'agent', r.reply); speak(r.reply); }
  if (r.availability) refreshAvail(r.availability);
  if (r.stt) { sttBackend = r.stt; setPill(); }
}

$('callBtn').onclick = async () => {
  const r = await (await fetch('/api/call/start', {method:'POST'})).json();
  sid = r.session;
  $('log').innerHTML = '';
  setLive(true);
  nlu = r.extractor;
  sttBackend = r.stt_available ? sttBackend : 'not installed';
  serverTTS = !!r.server_tts;
  setPill();
  add('agent', r.greeting); speak(r.greeting);
  refreshAvail();
};
$('hangBtn').onclick = () => {
  if (stream) stream.getTracks().forEach(t => t.stop());
  sid = null; setLive(false); add('sys', 'Call ended.');
};

async function startRec(){
  if (recording || !sid) return;
  stopSpeaking();                    // barge-in: cut the agent off the moment you talk
  try { stream = await navigator.mediaDevices.getUserMedia(
        {audio:{echoCancellation:true, noiseSuppression:true, autoGainControl:true}}); }
  catch(e){ add('sys','Microphone blocked — use the text box instead.'); return; }
  const mime = MediaRecorder.isTypeSupported('audio/webm;codecs=opus') ? 'audio/webm;codecs=opus' : 'audio/webm';
  rec = new MediaRecorder(stream, {mimeType:mime});
  chunks = [];
  rec.ondataavailable = e => { if (e.data.size) chunks.push(e.data); };
  rec.onstop = sendAudio;
  rec.start();
  recording = true; $('micBtn').classList.add('rec'); $('micBtn').textContent = 'Listening… release';
}
function stopRec(){
  if (!recording) return;
  recording = false; $('micBtn').classList.remove('rec'); $('micBtn').textContent = 'Hold to talk';
  if (rec && rec.state !== 'inactive') rec.stop();
}
async function sendAudio(){
  const blob = new Blob(chunks, {type:'audio/webm'});
  if (stream) stream.getTracks().forEach(t => t.stop());
  if (!blob.size || !sid) return;
  add('sys','transcribing…');
  const r = await (await fetch('/api/turn?session=' + sid, {method:'POST', body:blob})).json();
  $('log').querySelectorAll('.sys').forEach(n => { if (n.textContent === 'transcribing…') n.remove(); });
  applyResult(r);
}
// push-to-talk: hold mouse / touch
const mic = $('micBtn');
mic.addEventListener('mousedown', startRec);
mic.addEventListener('mouseup', stopRec);
mic.addEventListener('mouseleave', stopRec);
mic.addEventListener('touchstart', e => { e.preventDefault(); startRec(); });
mic.addEventListener('touchend', e => { e.preventDefault(); stopRec(); });

async function sendText(){
  const t = $('txt').value.trim();
  if (!t || !sid) return;
  $('txt').value = '';
  const r = await (await fetch('/api/text?session=' + sid, {method:'POST',
      headers:{'Content-Type':'application/json'}, body:JSON.stringify({text:t})})).json();
  applyResult(r);
}
$('sendBtn').onclick = sendText;
$('txt').addEventListener('keydown', e => { if (e.key === 'Enter') sendText(); });
$('resetBtn').onclick = async () => { refreshAvail(await (await fetch('/api/reset',{method:'POST'})).json()); };

refreshAvail();
</script>
